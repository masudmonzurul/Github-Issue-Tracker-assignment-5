<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>


    <!-- Daisy UI & Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body class="bg-slate-50 py-20">
    <div class="max-w-[520px] max-h-[743px] mx-auto bg-white rounded-md pt-7 pb-20">

        <div>
            <img src="./assets/github-logo.png" alt="github-logo" class="w-[100px] mx-auto">
            <h1 class="text-center mt-6  text-2xl  ">GitHub Issues Tracker</h1>
            <p class="text-center text-slate-500">Sign in to manage your issues</p>
        </div>

        <fieldset class="fieldset mt-4 px-4 pt-2 bg-white max-w-6xl mx-auto">
            <label class="label text-black text-base pl-3">Username</label>
            <input id="username" type="text" class="input w-19/20 mx-auto rounded-md h-12"
                placeholder="Enter Username" />

            <label class="label  text-black text-base pl-3 mt-5">Password</label>
            <input id="password" type="password" class="input w-19/20 mx-auto rounded-md h-12 "
                placeholder="Password" />

            <button id="sign-btn" class="btn btn-neutral mt-10 bg-blue-700 h-12 rounded-md w-19/20 mx-auto">Sign In</button>
        </fieldset>

        <div class="flex items-center mt-6 px-8">
            <hr class="w-[100%] items-center text-slate-300">
            <p class="mx-2">OR</p>
            <hr class="w-[100%] items-center text-slate-300">
        </div>
    </div>
    <script src="./js/signin.js"></script>

</body>

</html>
