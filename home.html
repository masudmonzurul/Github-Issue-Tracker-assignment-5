<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>

    <!-- Daisy UI & Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        .bug {
            background-color: #FEECEC;
            font-size: 12px;
            color: #EF4444;
            padding: 2px 10px;
            border-radius: 25px;
            font-weight: 300;
            border: 1px solid #FECACA;

        }

        .bug::before {
            content: "";
            display: inline-block;
            width: 13px;
            height: 13px;
            vertical-align: middle;

            margin-right: 2px;
            background: #EF4444;
            mask: url("./assets/bug-solid-full.svg");
            background-size: contain;
            background-repeat: no-repeat;
        }

        .helpwanted {
            background-color: #FFF8DB;
            font-size: 12px;
            color: #D97706;
            padding: 2px 10px;
            border-radius: 25px;
            font-weight: 300;
            border: 1px solid #FDE68A;
        }

        .helpwanted::before {
            content: "";
            display: inline-block;
            width: 13px;
            height: 13px;
            vertical-align: middle;
            margin-right: 2px;
            background: #D97706;
            mask: url("./assets/life-ring-solid-full.svg");
            background-size: contain;
            background-repeat: no-repeat;
        }

        .enhancement {
            background-color: #DEFCE8;
            font-size: 12px;
            color: #00a96e;
            padding: 2px 10px;
            border-radius: 25px;
            font-weight: 300;
            border: 1px solid #BBF7D0;
        }

        .enhancement::before {
            content: "";
            display: inline-block;
            width: 13px;
            height: 13px;
            vertical-align: middle;
            margin-right: 2px;
            background: #00a96e;
            mask: url("./assets/enhancement.svg");
            background-size: contain;
            background-repeat: no-repeat;
        }

        .goodfirstissue {
            background-color: #E0F2FE;
            font-size: 12px;
            color: #0284C7;
            padding: 2px 10px;
            border-radius: 25px;
            font-weight: 300;
            border: 1px solid #ccfdba;
        }

        .goodfirstissue::before {
            content: "";
            display: inline-block;
            width: 13px;
            height: 13px;
            vertical-align: middle;
            margin-right: 2px;
            background: #0284C7;
            mask: url("./assets/document.svg");
            background-size: contain;
            background-repeat: no-repeat;
        }

        .documentation {
            background-color: #f2f4e7;
            font-size: 12px;
            color: #5a554a;
            padding: 2px 10px;
            border-radius: 25px;
            font-weight: 300;
            border: 1px solid #d7d8d0;
        }

        .documentation::before {
            content: "";
            display: inline-block;
            width: 13px;
            height: 13px;
            vertical-align: middle;
            margin-right: 2px;
            background: #5a554a;
            mask: url("./assets/good-first.svg");
            background-size: contain;
            background-repeat: no-repeat;
        }
    </style>
</head>

<body class="bg-slate-50 mb-5 mx-auto px-1">
    <header class="flex flex-wrap justify-between px-5 py-5 bg-white mx-auto">
        <div class="flex flex-wrap items-center px-4">
            <img src="./assets/github-logo.png" alt="logo" width=36>
            <p class="m-1 font-semibold text-2xl">GitHub Issues Tracker</p>
        </div>

        <div class=" flex items-center">
            <label class="input">

                <input type="search" required placeholder="Search issues..." class="w-full h-11 rounded-md "
                    id="input-search" />
            </label>
            <button id="btn-search" class="btn ml-4 bg-blue-700 text-slate-100 w-32 h-11 rounded-md">Search</button>
        </div>
    </header>

    <nav class="bg-white mt-14 max-w-6xl  py-6 pl-6 mx-auto rounded-md">
        <button id="all" class="btn bg-blue-700 text-slate-100  rounded-md mr-2 w-3/12">All</button>
        <button id="open" class="btn bg-slate-50 text-slate-700 rounded-md mr-2 w-3/12">Open</button>
        <button id="close" class="btn bg-slate-50 text-slate-700 rounded-md my-2 w-3/12">Close</button>
    </nav>
    <main>
        <section class="bg-white mt-4 max-w-6xl p-6 mx-auto rounded-md max-h-24 flex justify-between">
            <div class="flex justify-center items-center">
                <div>
                    <img src="./assets/Aperture.png" width="70" class="bg-[#ECE4FF] p-1 rounded-full">
                </div>
                <div class="ml-2">
                    <p class="font-semibold text-xl"><span id="counter"></span> Issues</p>
                    <p class="text-slate-500 ">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex flex-wrap gap-4 items-center justify-center">
                <div class="flex items-center mr-3">
                    <img src="./assets/Open-Status.png" alt="">
                    <p>Open</p>
                </div>
                <div class="flex items-center">
                    <img src="./assets/Closed- Status .png" alt="">
                    <p>Closed</p>
                </div>
            </div>
        </section>
        <section id="issues-container"
            class="bg-[#FBFBFB] max-w-6xl mx-auto border-t-2 border-[#E4E4E7] flex gap-4 flex-wrap justify-center">


        </section>
        <!-- Open the modal using ID.showModal() method -->

        <dialog id="my_modal_1" class="modal">

        </dialog>
        
    </main>

    <script src="./js/script.js"></script>
</body>

</html>
